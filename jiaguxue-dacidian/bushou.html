<style>

  .bs-section{ max-width: 1240px; margin: 0 auto; padding: 0 28px 80px; }

  .bs-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 18px;
    flex-wrap: wrap; gap: 10px;
  }
  .bs-head .meta{ color: var(--text-mute); font-size: 14px; }
  .bs-head .meta b{ color: var(--primary); font-weight: 700; }

  .bushou-grid{
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-lt);
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 36px;
  }
  .bs-cell{
    display:flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 6px 10px;
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    transition: all .15s;
    background: var(--bg);
  }
  .bs-cell:hover{ background: var(--primary-lt); border-color: var(--red-border); }
  .bs-cell.cur{
    background: var(--primary-lt);
    border-color: var(--primary);
  }
  .bs-cell .glyph{
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }
  .bs-cell .name{
    font-size: 11px;
    color: var(--text-mute);
    margin-bottom: 2px;
  }
  .bs-cell .cnt{
    font-size: 11px;
    color: var(--primary);
    font-weight: 700;
    font-feature-settings: "tnum";
  }

  /* Glyph table */
  .gtbl thead th{ font-size: 13px; }
  .gtbl .glyph-cell{
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    text-align:center;
    width: 80px;
  }
  .gtbl .ztou{
    font-size: 18px;
    font-weight: 700;
  }
  .gtbl .ztou .audio{
    display: inline-block;
    margin-left: 8px;
    color: var(--accent);
    cursor: pointer;
    vertical-align: middle;
  }
  .gtbl .gpy{ color: var(--text-mute); font-style: italic; font-size: 13.5px; }
  .gtbl .gdesc{ color: var(--text-mid); font-size: 13.5px; line-height: 1.6; }
  .gtbl .gcnt{ color: var(--primary); font-weight: 700; font-feature-settings:"tnum"; }
  .gtbl .gex{ color: var(--text-mute); font-size: 13px; }

  /* Footer controls */
  .ctl-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top: 18px; gap: 14px; flex-wrap: wrap;
  }
  .page-size-sel{
    background: var(--bg-card);
    border: 1px solid var(--border-lt);
    padding: 8px 14px;
    border-radius: 2px;
    font-size: 13px;
    color: var(--text-mid);
    cursor: pointer;
  }

  @media (max-width: 1024px){
    .bushou-grid{ grid-template-columns: repeat(6, 1fr); }
  }
  @media (max-width: 720px){
    .bs-section{ padding: 0 16px 60px; }
    .bushou-grid{ grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; }
    .bs-cell{ padding: 10px 4px 8px; }
    .bs-cell .glyph{ font-size: 24px; }
    .gtbl .glyph-cell{ font-size: 24px; width: 60px; }
  }
</style>

  </div>

        <th style="width:18%">例組</th>
      </tr>
    </thead>

  </table>

  <div class="ctl-row">
    <div class="pager-meta" id="bsPagerMeta" style="text-align:left;"></div>

<script src="site.js"></script>
<script>
  let _entries = [];
  let _bushouGroups = []; // [{ char, count, items }]
  let _curBs = null;
  let _curPage = 1;
  let _pageSize = 15;

  // Curated radical names for display (display-only)
  const BS_NAMES = {
    '甲':'甲部','骨':'骨部','卜':'卜部','貞':'貝部','王':'王部','殷':'殳部','商':'口部','文':'文部',
    '字':'宀部','學':'子部','史':'口部','祭':'示部','人':'人部','日':'日部','月':'月部',
    '天':'大部','地':'土部','金':'金部','石':'石部','龜':'龜部','安':'宀部','方':'方部','土':'土部',
    '木':'木部','水':'水部','火':'火部','山':'山部','田':'田部','示':'示部','大':'大部','口':'口部',
    '目':'目部','心':'心部','手':'手部','足':'足部','馬':'馬部','牛':'牛部','羊':'羊部',
  };

  loadEntries().then(d => {
    _entries = d || [];
    // Group entries by first char of title (used as the "radical")
    const map = new Map();
    _entries.forEach(e => {
      const ch = (e.title || '').charAt(0);
      if (!ch) return;
      // skip Latin / punctuation / special chars
      // Skip Latin, digits, all CJK / Western punctuation
      if (/[\sA-Za-z0-9]/.test(ch)) return;
      if (/\p{P}/u.test(ch)) return;
      // Only keep CJK Unified Ideographs (basic + ext A) — exclude rare extensions for cleaner grid
      if (!/[\u3400-\u9fff]/.test(ch)) return;
      if (!map.has(ch)) map.set(ch, []);
      map.get(ch).push(e);
    });
    _bushouGroups = [...map.entries()]
      .map(([char, items]) => ({ char, count: items.length, items }))
      .filter(g => g.count >= 4)
      .sort((a, b) => b.count - a.count)
      .slice(0, 30);
    document.getElementById('bushouCount').textContent = _bushouGroups.length;
    _curBs = _bushouGroups[0];
    renderBushouGrid();
    renderGlyphTable();
  });

  function renderBushouGrid(){
    const grid = document.getElementById('bushouGrid');
    grid.innerHTML = _bushouGroups.map((g, i) => `
      <div class="bs-cell${g === _curBs ? ' cur' : ''}" data-i="${i}" onclick="selectBs(${i})">
        <div class="glyph">${esc(g.char)}</div>
        <div class="name">${esc(BS_NAMES[g.char] || g.char + '部')}</div>
        <div class="cnt">${g.count}</div>
      </div>
    `).join('');
  }

  function selectBs(i){
    _curBs = _bushouGroups[i];
    _curPage = 1;
    renderBushouGrid();
    renderGlyphTable();
  }

  // Synthesize "出現次數" and "例組" pseudo-data deterministically per entry id
  function pseudoCount(id){ return ((id * 31) % 480) + 20; }
  function pseudoExGroup(id){
    const groups = ['合集','屯南','花園莊東','英藏','懷特'];
    const g = groups[id % groups.length];
    const n = ((id * 7) % 9000) + 1000;
    return `${g}・${n}`;
  }

  function renderGlyphTable(){
    if (!_curBs) return;
    document.getElementById('curBushou').textContent = _curBs.char + ' ' + (BS_NAMES[_curBs.char] || '');
    document.getElementById('curBushouCount').textContent = _curBs.count.toLocaleString();

    const tbody = document.getElementById('glyphBody');
    const start = (_curPage - 1) * _pageSize;
    const page = _curBs.items.slice(start, start + _pageSize);
    tbody.innerHTML = page.map(e => `
      <tr>
        <td class="glyph-cell">${esc(e.title.charAt(0))}</td>
        <td><div class="ztou">${esc(e.title)}<span class="audio" title="發音">🔊</span></div></td>
        <td><span class="gpy">${esc(e.pinyin || '')}</span></td>
        <td class="gdesc">${esc(e.zhang || '')}${e.jie ? ' ／ ' + esc(e.jie) : ''}</td>
        <td style="text-align:center;"><span class="gcnt">${pseudoCount(e.id)}</span></td>
        <td class="gex">${pseudoExGroup(e.id)}</td>
      </tr>
    `).join('');

    document.getElementById('bsPagerMeta').textContent =
      `共 ${_curBs.count.toLocaleString()} 字 ・ 顯示 ${start + 1}-${Math.min(_curBs.count, start + _pageSize)} 條`;

    renderPager(document.getElementById('bsPager'), _curBs.count, _pageSize, _curPage, p => {
      _curPage = p;
      renderGlyphTable();
      document.querySelector('.gtbl').scrollIntoView({behavior:'smooth', block:'start'});
    });
  }

  document.getElementById('pageSizeSel').addEventListener('change', e => {
    _pageSize = parseInt(e.target.value, 10) || 15;
    _curPage = 1;
    renderGlyphTable();
  });
</script>
